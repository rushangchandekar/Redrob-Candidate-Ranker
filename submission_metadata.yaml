ai_usage_summary: |
  Used Gemini and Claude for architectural discussion, drafting scoring code, and code refactoring. 
  No candidate data was shared with external APIs. All ranking was done offline.

methodology_summary: |
  A two-phase hybrid search and multi-dimensional ranking pipeline. Phase 1 embeds candidate profiles 
  offline using sentence-transformers (all-MiniLM-L6-v2) and constructs a FAISS IndexFlatIP. Phase 2 (ranking) 
  searches the index in under 1 second to retrieve top-1000 candidates, then scores them across 5 dimensions: 
  Weighted Semantic JD similarity, Career Trajectory progression, Skill Depth (using proficiency, endorsements, 
  and duration with stuffer penalties), Behavioral signals (23 native metrics), and Platform Activity. 
  Impossible timelines and envelope range violations penalize and filter honeypots, and behavioral twin 
  deduplication handles duplicate clusters. Complete run finishes in under 1 second per query.

